<!DOCTYPE html>
<html>

		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"/>
		<style type="text/css" media="screen">
			* {
				font-family: 'Ubuntu Mono', monospace;
			}
			html,
			body {
				background-color: black;
				color: white;
				height: 100%;
			}
			@keyframes blink {
				50% {
					opacity: 1.0;
				}
			}
			@-webkit-keyframes blink {
				50% {
					opacity: 1.0;
				}
			}
			.blink {
				animation: blink 1s step-start 0s infinite;
				-webkit-animation: blink 1s step-start 0s infinite;
				transition-delay: .2s;
			}
			.nonblink {
				margin-top: 41px;
				margin-left: 5px;
				height: 10px;
				width: 25px;
				background-color: white;
				opacity: 0.0;
			}
			.menu-button {
				font-size: 30px;
				border-bottom: 1px solid white;
				cursor: pointer;
			}
			.menu-small {
				background-color: black;
				border: 1px solid white;
				margin-top: 45.8px;
				display: block!important;
				z-index: 1000!important;
			}
			.dalink > a {
				text-decoration: underline!important;
			}
			.dalink > a:hover {
				cursor: pointer;
			}
			.square {
				border-top : 0.1px solid white;
			}
			.soc {
				font-size: 2rem;
			}
		</style>
	</head>
	<body>
		<div class="fixed-top d-none menu-self" style="z-index: 0">

				<div class="row" style="font-size: 30px">

						<a href="" id="bloglink" class="text-decoration-none text-white font-weight-bold"></a>
					</div>
				</div>
				<div class="row">
					<div class="col-md-3">
						<hr class="bg-white">
					</div>
				</div>
				<div class="row">
					<div class="col-md-3 mb-4">
						<div class="row">
							<div class="col-md-6 col-4 mx-auto">
								<img src="https://avatars1.githubusercontent.com/u/16417535?s=460&u=1eba3036d68bf8cc8c94d4c089cacb498a9c1582&v=4" alt="mujdecisy" style="width: 100%; border-radius: 50%; border: 5px solid white;">
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="fixed-top d-md-none" style="background-color: black;">
			<div class="row pr-3">
				<div class="col-auto ml-auto menu-button">
					menu
				</div>
			</div>
		</div>
		<div class="container h-100 d-flex flex-column justify-content-center align-items-center" style="padding-top: 8vh;">
			<div class="d-md-none w-100" style="height: 46.8px;"></div>
			
			<div class="mb-5">
				<h1>hallo, ich bin safa</h1>
				<h3>ich bin eine neugierige person und ich arbeite an software-design und datenwissenschaft.</h3>
			</div>
			<div class="row justify-content-around col-md-6 mx-auto d-none d-md-flex" style="font-size: 2.5rem;">
				<div class="col d-flex flex-row dalink justify-content-center">
					<a href="/de/about" class="text-decoration-none text-white font-weight-bold">über</a>
					<!--<div class="nonblink"></div>-->
				</div>
				<div class="col d-flex flex-row dalink justify-content-center">
					<a href="/de/blog" class="text-decoration-none text-white font-weight-bold">blog</a>
					<!--<div class="nonblink"></div>-->
				</div>
			</div>
		</div>
		<div class="fixed-bottom pt-3" style="background-color: black; border-top: 1px solid gray;">
			<div class="row mx-auto d-flex col-md-6 justify-content-around">
				<div class="col px-0 d-flex justify-content-center">
					<a href="https://github.com/mujdecisy" target="_blank" class="text-decoration-none text-white">
						<i class="fab fa-github soc"></i>
					</a>
				</div>
				<div class="col px-0 d-flex justify-content-center">
					<a href="https://www.linkedin.com/in/mujdecisy" target="_blank" class="text-decoration-none text-white">
						<i class="fab fa-linkedin-in soc"></i>
					</a>
				</div>
				<div class="col px-0 d-flex justify-content-center">
					<a href="https://twitter.com/mujdecisy" target="_blank" class="text-decoration-none text-white">

					</a>

				<div class="col px-0 d-flex justify-content-center">
					<a href="https://www.instagram.com/mujdecisy" target="_blank" class="text-decoration-none text-white">
						<i class="fab fa-instagram soc"></i>
					</a>
				</div>
			</div>
			<div class="row col-md-3 mx-auto mt-2">
				<div class="col px-0 d-flex justify-content-center">
					<a href="/" class="text-decoration-none text-white square">tr</a>
				</div>
				<div class="col px-0 d-flex justify-content-center">
					<a href="/en" class="text-decoration-none text-white square">en</a>
				</div>
				<div class="col px-0 d-flex justify-content-center">
					<a href="/de" class="text-decoration-none text-white square">de</a>
				</div>
			</div>
		</div>
		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
		<script>
			$('.dalink').hover(
				function(){ $(this).find('.nonblink').addClass('blink') },
				function(){ $(this).find('.nonblink').removeClass('blink') }
			);
			var menutoggle = false;
			var defaultmenuname = $(".menu-button").text();
			$(".menu-button").click(function(){
				if (menutoggle === false) {
					$(".menu-self").addClass("menu-small");
					$(this).text("X");
				} else {
					$(".menu-self").removeClass("menu-small");
					$(this).text(defaultmenuname);
				}
				menutoggle = !menutoggle;
			});
			$(".anchor").parent().addClass("anchor_fill");
			let loc = window.location.href;
			let homelink = $("#homelink");
			let aboutlink = $("#aboutlink");
			let bloglink = $("#bloglink");
			if (loc.includes("/en/")) {
				homelink.text("home");
				homelink.attr("href", "/en/");
				aboutlink.text("about");
				aboutlink.attr("href", "/en/about");
				bloglink.text("blog");
				bloglink.attr("href", "/en/blog");
			} else if (loc.includes("/de/")) {
				homelink.text("hauptseite");
				homelink.attr("href", "/de/");
				aboutlink.text("über");
				aboutlink.attr("href", "/de/about");
				bloglink.text("blog");
				bloglink.attr("href", "/de/blog");
			} else {
				homelink.text("ana sayfa");
				homelink.attr("href", "/");
				aboutlink.text("hakkında");
				aboutlink.attr("href", "/about");
				bloglink.text("blog");
				bloglink.attr("href", "/blog");
			}
		</script>

</html>
