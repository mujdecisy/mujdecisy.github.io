<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Safa Yasin Mujdeci</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"/>

	<style type="text/css" media="screen">
		* {
			font-family: 'Ubuntu Mono', monospace;
		}

		html,
		body {
			background-color: black;
			color: white;
			height: 100%;
		}

		@keyframes blink {
			50% {
				opacity: 1.0;
			}
		}

		@-webkit-keyframes blink {
			50% {
				opacity: 1.0;
			}
		}

		.blink {
			animation: blink 1s step-start 0s infinite;
			-webkit-animation: blink 1s step-start 0s infinite;
		}

		.nonblink {
			margin-top: 41px;
			margin-left: 5px;
			height: 10px;
			width: 25px;
			background-color: white;
			opacity: 0.0;
		}

		.dalink:hover {
			cursor: pointer;
		}

		.square {
			border-top : 0.1px solid white;
		}
	</style>
</head>

<body>

	<div class="container h-100" style="padding-top: 10vw;">
		<div class="mb-5">
			<h1>merhaba ben safa,</h1>
			<h3>yazilim mimarisi ve veri bilimi konulari uzerinde calisan, merakli biriyim.</h3>
		</div>

		<div class="row col-md-6 mx-auto" style="font-size: 40px;">
			<div class="col d-flex flex-row dalink justify-content-center">
				<a href="" class="text-decoration-none text-white font-weight-bold">hakkinda</a>
				<div class="nonblink"></div>
			</div>
			<div class="col d-flex flex-row dalink justify-content-center">
				<a href="" class="text-decoration-none text-white font-weight-bold">blog</a>
				<div class="nonblink"></div>
			</div>
		</div>

		<div class="row fixed-bottom col-md-4 mx-auto" style="bottom: 50px;">
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white">
					<i class="fab fa-github" style="font-size: 35px;"></i>
				</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white">
					<i class="fab fa-linkedin-in" style="font-size: 35px;"></i>
				</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white">
					<i class="fab fa-twitter" style="font-size: 35px;"></i>
				</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white">
					<i class="fab fa-facebook-f" style="font-size: 35px;"></i>
				</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white">
					<i class="fab fa-instagram" style="font-size: 35px;"></i>
				</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white">
					<i class="fab fa-stack-overflow" style="font-size: 35px;"></i>
				</a>
			</div>
		</div>

		<div class="row fixed-bottom col-md-3 mx-auto">
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white square">tr</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white square">en</a>
			</div>
			<div class="col px-0 d-flex justify-content-center">
				<a href="" class="text-decoration-none text-white square">de</a>
			</div>
		</div>
	</div>

	<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		$('.dalink').hover(
			function(){ $(this).find('.nonblink').addClass('blink') },
			function(){ $(this).find('.nonblink').removeClass('blink') }
		)

	</script>
</body>

</html>
